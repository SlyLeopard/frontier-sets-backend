spring:
  application:
    name:
      frontier-sets-backend
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
  messages:
    encoding: UTF-8
  mongodb:
      host: ${MONGO_LOCAL:localhost}
      port: ${MONGO_PORT:27017}
      database: ${MONGO_DB:db}
      username: ${MONGO_USER:root}
      password: ${MONGO_PASS:password}
      authentication-database: ${MONGO_AUTH:admin}
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
  server:
    port: ${APP_PORT:8080}